<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Bloom Beauty Studio</title>

        <link rel="stylesheet" href="style.css">
    </head>

    <body>
        
        <header>
            <h1>Bloom Beauty Studio</h1>
            <nav>
                <a href="index.html">Home</a>
                <a href="about.html">About</a>
                <a href="services.html">Services</a>
                <a href="shop.html">Shop</a>
                <a href="contact.html">Contact</a>
                <a href="checkout.html" class="cart-nav">
                    🛒 <span id="navCartCount">0</span>
                </a>
            </nav>
        </header>

        <section class="shop">
            <h2 class="section-title">Our Products</h2>
            <div class = "cart-summary">
                <p id="cartCount">Cart: 0 items</p>
                <a href="checkout.html" class="view-cart-btn">View Cart</a>
            </div>

            <p id="cartMessage"></p>

            <div class="product-container">
                
                <div class="product-card">
                    <h3>Face Cream</h3>
                    <p>Hydrating daily care for soft skin.</p>
                    <p><strong>149 </strong></p>
                    <button class="add-to-cart" data-product="Face Cream" data-price="149">Add to Cart</button>
                </div>

                <div class="product-card">
                    <h3>Body Lotion</h3>
                    <p>Nourishing lotion with floral fragrance.</p>
                    <p><strong>129 </strong></p>
                    <button class="add-to-cart" data-product="Body Lotion" data-price="129">Add to Cart</button>
                </div>

                <div class="product-card">
                    <h3>Beauty Serum</h3>
                    <p>Light serum for glowing and fresh skin.</p>
                    <p><strong>199 </strong></p>
                    <button class="add-to-cart" data-product="Beauty Serum" data-price="199">Add to Cart</button>
                </div>
            </div>

        </section>
        <script src="script.js"></script>
    </body>

</html>
