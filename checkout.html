<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Checkout | Bloom Beauty Studio</title>

        <link rel="stylesheet" href="style.css">
    </head>

    <body>
        <header>
            <h1>Bloom Beauty Studio</h1>
            <nav>
                <a href="index.html">Home</a>
                <a href="about.html">About</a>
                <a href="services.html">Services</a>
                <a href="shop.html">Shop</a>
                <a href="contact.html">Contact</a>
                <a href="checkout.html" class="cart-nav">
                    🛒 <span id="navCartCount">0</span>
                </a>

            </nav>
        </header>

        <section class="checkout-section">
            <h2>Your Order</h2>
            
            <p id="itemsCount"></p>
            <div id="checkoutItems"></div>
            <p id="checkoutTotal"></p>

            <div class="checkout-actions">
                <a href="shop.html" class="secondary-btn">Continue Shopping</a>
                <button id="clearCartBtn" type="button" class="secondary-btn">Clear Cart</button>
            </div>

            <h2>Customer Details</h2>

            <form id="checkoutForm" class="checkout-form">
                <div class="form-group">
                    <label for="customerName">Full Name</label>
                    <input type="text" id="customerName" required>
                </div>

                <div class="form-group">
                    <label for="customerEmail">Email</label>
                    <input type="email" id="customerName" required>
                </div>

                <div class="form-group">
                    <label for="customerPhone">Phone</label>
                    <input type="tel" id="customerPhone" required>
                </div>

                <div class="form-group">
                    <label for="customerAddress">Address</label>
                    <input type="text" id="customerAddress" required>
                </div>

                <div class="form-group">
                    <label for="customerCity">City</label>
                    <input type="text" id="customerCity" required>
                </div>

                <div class="form-group">
                    <label for="customerZip">Postal Code</label>
                    <input type="text" id="customerZip" required>
                </div>

                <div class="form-group full-width">
                    <button type="submit" id="placeOrderBtn">Place Order</button>
                </div>  
            </form>

            <p id="checkoutMessage"></p>
        </section>

        <script src="script.js"></script>
            
    </body>

</html>
